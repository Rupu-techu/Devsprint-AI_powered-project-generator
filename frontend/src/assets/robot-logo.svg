<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Glow effect definitions -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <linearGradient id="headGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Antenna -->
  <line x1="24" y1="8" x2="24" y2="4" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="24" cy="3" r="2" fill="#06b6d4" filter="url(#glow)"/>
  
  <!-- Robot head (round) -->
  <circle cx="24" cy="24" r="16" fill="url(#headGradient)" opacity="0.2"/>
  <circle cx="24" cy="24" r="16" fill="none" stroke="url(#headGradient)" stroke-width="2"/>
  
  <!-- Left eye -->
  <circle cx="18" cy="22" r="3" fill="#06b6d4" filter="url(#glow)"/>
  <circle cx="18" cy="22" r="1.5" fill="#ffffff"/>
  
  <!-- Right eye -->
  <circle cx="30" cy="22" r="3" fill="#06b6d4" filter="url(#glow)"/>
  <circle cx="30" cy="22" r="1.5" fill="#ffffff"/>
  
  <!-- Smile/mouth -->
  <path d="M 18 30 Q 24 34 30 30" stroke="#a855f7" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8"/>
  
  <!-- Decorative elements -->
  <circle cx="24" cy="32" r="1" fill="#06b6d4" opacity="0.6"/>
  <circle cx="20" cy="33" r="0.5" fill="#a855f7" opacity="0.6"/>
  <circle cx="28" cy="33" r="0.5" fill="#a855f7" opacity="0.6"/>
</svg>

